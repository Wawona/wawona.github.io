<script>
    // === GitHub Releases ===
    async function fetchReleases() {
        const c = document.getElementById('releases-list');
        if (!c) return;
        try {
            const r = await fetch('https://api.github.com/repos/Wawona/Wawona/releases?per_page=3');
            if (!r.ok) throw 0;
            const d = await r.json();
            if (!d.length) { c.innerHTML = '<p class="lp-empty">No releases yet.</p>'; return; }
            c.innerHTML = d.map(x => {
                const n = x.name || x.tag_name, t = new Date(x.published_at).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                return `<a href="${x.html_url}" target="_blank" rel="noopener" class="lp-col-item"><time>${t}</time><span>${n} <code>${x.tag_name}</code></span></a>`;
            }).join('');
        } catch (e) { c.innerHTML = '<div class="lp-empty"><p>Could not load releases.</p><a href="https://github.com/Wawona/Wawona/releases" target="_blank">View on GitHub &rarr;</a></div>'; }
    }

    // === Screenshot Carousel ===
    function initShowcase() {
        const track = document.getElementById('showcaseTrack'), dots = document.querySelectorAll('.lp-showcase-dot'), title = document.getElementById('showcaseBarTitle');
        if (!track || !dots.length) return;
        let cur = 0; const slides = track.querySelectorAll('.lp-showcase-slide'), total = slides.length;
        function go(i) { slides[cur].classList.remove('active'); dots[cur].classList.remove('active'); cur = i; slides[cur].classList.add('active'); dots[cur].classList.add('active'); if (title) title.textContent = slides[cur].dataset.title; }
        dots.forEach(d => d.addEventListener('click', () => go(+d.dataset.index)));
        setInterval(() => go((cur + 1) % total), 5000);
    }

    // === Scroll Reveal (Framer Motion-style) ===
    function initReveal() {
        const items = document.querySelectorAll('.lp-reveal');
        if (!items.length) return;
        const ob = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (!e.isIntersecting) return;
                const ch = e.target.querySelectorAll('.lp-feature-text,.lp-feature-visual,.lp-explore-card,.lp-col-card,.lp-platform,.lp-arch-chip,.lp-stat,.lp-pillar');
                ch.forEach((c, j) => { c.style.transitionDelay = `${j * 0.09}s`; c.classList.add('lp-revealed'); });
                e.target.classList.add('lp-revealed');
                ob.unobserve(e.target);
            });
        }, { threshold: 0.06, rootMargin: '0px 0px -30px 0px' });
        items.forEach(el => ob.observe(el));
    }

    // === Parallax ===
    function initParallax() {
        const els = document.querySelectorAll('[data-parallax]');
        if (!els.length || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (ticking) return; ticking = true;
            requestAnimationFrame(() => {
                const sy = window.scrollY;
                els.forEach(el => {
                    const speed = parseFloat(el.dataset.parallax);
                    const rect = el.getBoundingClientRect();
                    const offset = (rect.top + sy - window.innerHeight / 2) * speed;
                    el.style.transform = `translateY(${-offset * 0.15}px)`;
                });
                ticking = false;
            });
        }, { passive: true });
    }

    // === Mouse Tracking ===
    function initMouseTrack() {
        if (window.innerWidth < 768 || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const els = document.querySelectorAll('[data-mouse-track]');
        let mx = 0, my = 0, ticking = false;
        document.addEventListener('mousemove', e => {
            mx = (e.clientX / window.innerWidth - 0.5) * 2;
            my = (e.clientY / window.innerHeight - 0.5) * 2;
            if (ticking) return; ticking = true;
            requestAnimationFrame(() => {
                els.forEach(el => {
                    const s = parseFloat(el.dataset.mouseTrack);
                    el.style.transform = `translate3d(${mx * s}px, ${my * s}px, 0)`;
                });
                ticking = false;
            });
        }, { passive: true });
    }

    // === Init ===
    function lpInit() { fetchReleases(); initShowcase(); initReveal(); initParallax(); initMouseTrack(); }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', lpInit); else lpInit();
</script>
